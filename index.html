<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muvahid</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
            font-family: Verdana, sans-serif;
            overflow: hidden; 
        }
        
        .explosion-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Main text now stays visible in the middle the entire time */
        h1 {
            font-size: 3rem;
            text-align: center;
            padding: 0 20px;
            user-select: none;
            opacity: 1; 
            z-index: 10;
        }

        .mini-sentence {
            position: absolute;
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
        }

        /* Slower Left to Right animation with infinite loop visibility */
        @keyframes streamRight {
            0% {
                left: -25%;
                opacity: 0;
            }
            5% {
                opacity: 1;
            }
            95% {
                opacity: 1;
            }
            100% {
                left: 125%;
                opacity: 0;
            }
        }

        /* Slower Right to Left animation with infinite loop visibility */
        @keyframes streamLeft {
            0% {
                left: 125%;
                opacity: 0;
            }
            5% {
                opacity: 1;
            }
            95% {
                opacity: 1;
            }
            100% {
                left: -25%;
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="explosion-container">
        <h1 id="blast-text">Muvahid is a nigger.</h1>
    </div>

    <script>
    window.addEventListener('DOMContentLoaded', function() {
        const container = document.querySelector('.explosion-container');
        
        const phrases = [
            "he destroyed jmtc!", "femboy", "twink", "georgian fag", 
            "100% faggot", "shoot yourself.", "troon.", "fake mma fighter"
        ];

        // Spawn 20 phrases that loop on their own timelines
        for (let i = 0; i < 20; i++) {
            const span = document.createElement('span');
            span.textContent = phrases[Math.floor(Math.random() * phrases.length)];
            span.className = 'mini-sentence';

            // Random heights so they spread out vertically
            span.style.top = (Math.random() * 90 + 5) + 'vh';

            // SLOWER SPEEDS: Each sentence takes between 8 and 14 seconds to cross
            const duration = (8 + Math.random() * 6) + 's';
            span.style.animationDuration = duration;

            // STAGGER START TIMES: Delays them up to 10 seconds so they don't all start at once
            const delay = (Math.random() * 10) + 's';
            span.style.animationDelay = delay;

            // This tells the CSS to repeat the movement forever
            span.style.animationIterationCount = 'infinite';

            // Alternate directions
            if (i % 2 === 0) {
                span.style.animationName = 'streamRight';
            } else {
                span.style.animationName = 'streamLeft';
            }

            container.appendChild(span);
        }
    });
    </script>

</body>
</html>
