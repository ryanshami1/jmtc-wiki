<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muvahid</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
            font-family: Verdana, sans-serif;
            overflow: hidden; /* Keeps screen perfectly still while text moves */
        }
        
        .explosion-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 3rem;
            text-align: center;
            padding: 0 20px;
            user-select: none;
            opacity: 0; /* Starts hidden, then fades in later */
            z-index: 10;
        }

        /* Base styles for the streaming phrases */
        .mini-sentence {
            position: absolute;
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
        }

        /* Movement animation from Left to Right */
        @keyframes streamRight {
            0% {
                left: -20%;
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                left: 120%;
                opacity: 0;
            }
        }

        /* Movement animation from Right to Left */
        @keyframes streamLeft {
            0% {
                left: 120%;
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                left: -20%;
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="explosion-container">
        <h1 id="blast-text">Muvahid is a nigger.</h1>
    </div>

    <script>
    window.addEventListener('DOMContentLoaded', function() {
        const mainText = document.getElementById('blast-text');
        const container = mainText.parentElement;
        
        // The list of phrases traveling across the viewport
        const phrases = [
            "he destroyed jmtc!", "femboy", "twink", "georgian fag", 
            "100% faggot", "shoot yourself.", "troon.", "fake mma fighter"
        ];

        // Spawn 25 randomly staggered phrases
        for (let i = 0; i < 25; i++) {
            const span = document.createElement('span');
            span.textContent = phrases[Math.floor(Math.random() * phrases.length)];
            span.className = 'mini-sentence';

            // Random vertical positions across the layout (5% to 95% height)
            span.style.top = (Math.random() * 90 + 5) + 'vh';

            // Stagger their individual speeds (between 2 and 5 seconds total travel time)
            const duration = (2 + Math.random() * 3) + 's';
            span.style.animationDuration = duration;

            // Even numbers travel right, odd numbers travel left
            if (i % 2 === 0) {
                span.style.animationName = 'streamRight';
            } else {
                span.style.animationName = 'streamLeft';
            }

            container.appendChild(span);

            // Clean up elements from memory after they exit the viewing zone
            span.addEventListener('animationend', () => {
                span.remove();
            });
        }

        // Smoothly fade the primary headline into the screen center after 3.5 seconds
        setTimeout(() => {
            mainText.style.transition = 'opacity 1.5s ease';
            mainText.style.opacity = '1';
        }, 3500);
    });
    </script>

</body>
</html>
